<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Pelanggan Pascabayar</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      background: linear-gradient(135deg, #2f6f66, #18233e, #46ae73, #4c893c, #0a1411);
      margin:0;
      padding:30px;
    }

    .halaman{
      display:none;
    }

    h1{
      margin-bottom:25px;
      color:white;
    }

   
    .login-container{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-box{
      background:white;
      padding:40px;
      width:350px;
      border-radius:15px;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
      text-align:center;
    }

    .login-box h2{
      color:#18233e;
      margin-bottom:20px;
    }

    .login-box input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
      box-sizing:border-box;
    }

    .login-btn{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .error-text{
      color:red;
      margin-top:10px;
    }

    /* ================= DASHBOARD ================= */
    .pelanggan-container{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:15px;
      margin:12px 0;
      flex-wrap:wrap;
    }

    .pelanggan-btn{
      padding:16px 400px;
      font-size:16px;
      border:none;
      cursor:pointer;
      background:#2563eb;
      color:white;
      border-radius:8px;
    }

    .checklist-btn{
      padding:16px 25px;
      font-size:16px;
      border:none;
      cursor:pointer;
      border-radius:8px;
      color:white;
      background:red;
    }

    .sudah{ background:green; }
    .belum{ background:red; }

    .detail-box{
      background:white;
      max-width:1200px;
      margin:auto;
      padding:30px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .info{
      text-align:left;
      font-size:18px;
      margin-bottom:25px;
      line-height:1.8;
      color:black;
    }

    .sensor-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:15px;
      margin-top:25px;
    }

    .sensor-card{
      background:#ffffff;
      border-radius:12px;
      padding:20px;
      box-shadow:0 3px 8px rgba(0,0,0,0.08);
    }

    .sensor-card h3{
      margin-bottom:10px;
      font-size:16px;
    }

    .sensor-card p{
      font-size:18px;
      font-weight:bold;
      color:#2563eb;
    }

    .back-btn{
      margin-top:30px;
      padding:14px 25px;
      border:none;
      background:#2563eb;
      color:white;
      font-size:16px;
      border-radius:10px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="halaman" style="display:block;">
  <div class="login-container">
    <div class="login-box">
      <h2>Login Dashboard</h2>

      <input type="email" id="email" placeholder="Masukkan Email">
      <input type="password" id="password" placeholder="Masukkan Password">

      <button class="login-btn" onclick="loginDashboard()">Login</button>

      <p id="loginError" class="error-text"></p>
    </div>
  </div>
</div>

<!-- ================= HALAMAN UTAMA ================= -->
<div id="halaman1" class="halaman">
  <h1>Daftar Pelanggan Pascabayar</h1>

  <div id="daftarPelanggan"></div>

  <!-- Tombol bawah dashboard -->
  <div style="margin-top:40px; display:flex; flex-direction:column; align-items:center; gap:15px;">

    

    <!-- Logout -->
    <button class="back-btn" onclick="logoutDashboard()">
      Logout
    </button>

  </div>
</div>

<!-- ================= HALAMAN DETAIL ================= -->
<div id="halamanDetail" class="halaman">

  <div class="detail-box">

    <h2 id="judulPelanggan">Data Pelanggan</h2>

    <div class="info">
      <p><b>Nama :</b> <span id="nama"></span></p>
      <p><b>Golongan VA :</b> <span id="va"></span></p>
      <p><b>Alamat :</b> <span id="alamat"></span></p>
	  <p><b>idpel :</b> <span id="idpel"></span></p>
    </div>

    <div class="sensor-grid">
      <div class="sensor-card"><h3>Tegangan</h3><p id="tegangan"></p></div>
      <div class="sensor-card"><h3>Arus</h3><p id="arus"></p></div>
      <div class="sensor-card"><h3>Daya</h3><p id="daya"></p></div>
      <div class="sensor-card"><h3>Cos Phi</h3><p id="cosphi"></p></div>
      <div class="sensor-card"><h3>Frekuensi</h3><p id="frekuensi"></p></div>
      <div class="sensor-card"><h3>Energi</h3><p id="energi"></p></div>
      <div class="sensor-card"><h3>Biaya</h3><p id="biaya"></p></div>
    </div>

    <button class="back-btn" onclick="pindahHalaman('halaman1')">
      Kembali ke Dashboard Utama
    </button>

  </div>
</div>

<script>
/* ================= LOGIN ================= */
const allowedEmail = "ariqalmas045@gmail.com";
const allowedPassword = "16557855664";

function loginDashboard(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const error = document.getElementById("loginError");

  if(email === allowedEmail && password === allowedPassword){

    localStorage.setItem("loginStatus", "true");

    document.querySelectorAll('.halaman').forEach(halaman=>{
      halaman.style.display = "none";
    });

    document.getElementById("halaman1").style.display = "block";
  }

  else{
    error.innerText = "Email atau Password salah!";
  }
}

function logoutDashboard(){
  localStorage.removeItem("loginStatus");

  document.querySelectorAll('.halaman').forEach(halaman=>{
    halaman.style.display = "none";
  });

  document.getElementById("loginPage").style.display = "block";
}

window.onload = function(){

  const status = localStorage.getItem("loginStatus");

  if(status === "true"){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("halaman1").style.display = "block";
  }

  else{
    document.getElementById("loginPage").style.display = "block";
  }
}

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyB_zewOQrIozWGldGAdaTtyN0zCAqoH3DQ",
  authDomain: "pzem1-5a8c2.firebaseapp.com",
  databaseURL: "https://pzem1-5a8c2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "pzem1-5a8c2",
  storageBucket: "pzem1-5a8c2.firebasestorage.app",
  messagingSenderId: "842178237968",
  appId: "1:842178237968:web:0fc99a7339ace8bb1e1c95"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= DATA PELANGGAN ================= */
const pelangganData = [
  { nama:"Ariq Almas Zaidan", va:"R-1(Non-subsidi) 900 VA", alamat:"Jl. Menco No. 14", idpel:"16557855661" },
  { nama:"Pelanggan 2", va:"R-1(Non-subsidi) 2200 VA", alamat:"Jl. Mawar No. 2", idpel:"16557855665" },
  { nama:"Pelanggan 3", va:"R-1(Non-subsidi) 900 VA", alamat:"Jl. Kenanga No. 3", idpel:"16557855666" },
  { nama:"Pelanggan 4", va:"R-1(Non-subsidi) 2200 VA", alamat:"Jl. Anggrek No. 4", idpel:"16557855667" },
  { nama:"Pelanggan 5", va:"R-1(Subsidi) 450 VA", alamat:"Jl. Dahlia No. 5", idpel:"16557855668" },
  { nama:"Pelanggan 6", va:"R-1(Subsidi) 450 VA", alamat:"Jl. Flamboyan No. 6", idpel:"16557855669" },
  { nama:"Pelanggan 7", va:"R-1(Non-subsidi) 2200 VA", alamat:"Jl. Cemara No. 7", idpel:"16557855670" },
  { nama:"Pelanggan 8", va:"R-1(Subsidi) 450 VA", alamat:"Jl. Teratai No. 8", idpel:"16557855671" },
  { nama:"Pelanggan 9", va:"R-1(Non-subsidi) 2200 VA", alamat:"Jl. Sakura No. 9", idpel:"16557855672" },
  { nama:"Pelanggan 10", va:"R-1(Subsidi) 900 VA", alamat:"Jl. Bougenville No. 10", idpel:"16557855673" }
];

/* ================= STATUS BAYAR ================= */
let statusPembayaran = {};
const daftar = document.getElementById("daftarPelanggan");

pelangganData.forEach((pelanggan,index)=>{

  statusPembayaran[index] = false;

  daftar.innerHTML += `
    <div class="pelanggan-container">
      <button class="pelanggan-btn" onclick="tampilDetail(${index})">
        ${pelanggan.nama}
      </button>

      <button id="statusBayar${index}" class="checklist-btn belum" onclick="togglePembayaran(${index})">
        ❌ Belum Bayar
      </button>
    </div>
  `;
});

/* ================= NAVIGASI ================= */
function pindahHalaman(targetId){
  document.querySelectorAll('.halaman').forEach(halaman=>{
    halaman.style.display = "none";
  });

  document.getElementById(targetId).style.display = "block";
}

/* ================= CHECKLIST ================= */
function togglePembayaran(index){

  statusPembayaran[index] = !statusPembayaran[index];

  const tombol = document.getElementById("statusBayar" + index);

  if(statusPembayaran[index]){
    tombol.innerText = "✅ Sudah Bayar";
    tombol.className = "checklist-btn sudah";
  } else {
    tombol.innerText = "❌ Belum Bayar";
    tombol.className = "checklist-btn belum";
  }
}

/* ================= DETAIL ================= */
function tampilDetail(index){

  /* ================= DETAIL KHUSUS PELANGGAN 1 ================= */
let firebaseRef = db.ref("pzem");

function tampilDetail(index){

  const p = pelangganData[index];

  /* Isi data pelanggan */
  document.getElementById("judulPelanggan").innerText = p.nama;
  document.getElementById("nama").innerText = p.nama;
  document.getElementById("va").innerText = p.va;
  document.getElementById("alamat").innerText = p.alamat;
  document.getElementById("idpel").innerText = p.idpel;

  /* MATIKAN semua listener sebelumnya */
  firebaseRef.off();

  /* ================= HANYA PELANGGAN 1 ================= */
  if(index === 0){

    firebaseRef.on("value", function(snapshot){

      const d = snapshot.val();

      if(!d){
        document.getElementById("tegangan").innerText = "-";
        document.getElementById("arus").innerText = "-";
        document.getElementById("daya").innerText = "-";
        document.getElementById("cosphi").innerText = "-";
        document.getElementById("frekuensi").innerText = "-";
        document.getElementById("energi").innerText = "-";
        document.getElementById("biaya").innerText = "-";
        return;
      }

      document.getElementById("tegangan").innerText = d.voltage + " V";
      document.getElementById("arus").innerText = d.current + " A";
      document.getElementById("daya").innerText = d.power + " W";
      document.getElementById("cosphi").innerText = d.pf;
      document.getElementById("frekuensi").innerText = d.frequency + " Hz";
      document.getElementById("energi").innerText = d.energy + " kWh";
      document.getElementById("biaya").innerText = "Rp " + d.biaya;

    });

  }

  /* ================= PELANGGAN 2–10 ================= */
  else{

    document.getElementById("tegangan").innerText = "0 V";
    document.getElementById("arus").innerText = "0 A";
    document.getElementById("daya").innerText = "0 W";
    document.getElementById("cosphi").innerText = "0";
    document.getElementById("frekuensi").innerText = "0 Hz";
    document.getElementById("energi").innerText = "0 kWh";
    document.getElementById("biaya").innerText = "Rp 0";
  }

  /* Pindah halaman */
  pindahHalaman("halamanDetail");
}
</script>

</body>
</html>
